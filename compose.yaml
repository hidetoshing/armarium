services:
  armarium:
    build: .
    image: ${ARMARIUM_IMAGE:-armarium}:${ARMARIUM_TAG:-latest}
    restart: unless-stopped
    environment:
      ARMARIUM_CONFIG: /config/config.json
    volumes:
      - ./config.json:/config/config.json:ro
      - ./books:/books:ro
      - armarium-cache:/data/cache

volumes:
  armarium-cache:
